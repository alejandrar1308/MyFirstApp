<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World Alejandra</title>
  <style>
    :root {
      --bg-1: #fdf2e9;
      --bg-2: #d7f9f1;
      --card: rgba(255, 255, 255, 0.75);
      --text: #1f2937;
      --accent: #0f766e;
      --accent-2: #f97316;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(249, 115, 22, 0.25), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(15, 118, 110, 0.22), transparent 40%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .shape {
      position: fixed;
      width: 220px;
      height: 220px;
      border-radius: 40% 60% 50% 50%;
      filter: blur(8px);
      opacity: 0.22;
      animation: float 12s ease-in-out infinite;
      z-index: 0;
    }

    .shape.one { top: -30px; left: -40px; background: #f97316; }
    .shape.two { bottom: -40px; right: -30px; background: #0f766e; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(8deg); }
    }

    .card {
      width: min(92vw, 760px);
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow);
      z-index: 1;
      animation: reveal 700ms ease-out;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .name {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: var(--accent-2);
      text-underline-offset: 4px;
    }

    p {
      margin: 0.9rem 0 1.4rem;
      font-size: 1.04rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 0.85rem;
      margin: 1.2rem 0;
    }

    .tile {
      border-radius: 12px;
      padding: 0.8rem;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(15, 118, 110, 0.14);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 0.25rem;
    }

    .value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 1rem;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.62rem 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: var(--accent-2);
      color: white;
    }

    #message {
      margin-top: 0.9rem;
      min-height: 1.2rem;
      font-weight: 700;
      color: #0b4f48;
    }

    @media (max-width: 540px) {
      .card { padding: 1.3rem; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="shape one" aria-hidden="true"></div>
  <div class="shape two" aria-hidden="true"></div>

  <main class="card" role="main">
    <h1>Hello World, <span class="name">Alejandra</span>!</h1>
    <p>
      This page demonstrates responsive layout, animations, live data updates, and interactive UI with plain HTML/CSS/JS.
    </p>

    <section class="grid" aria-label="Live widgets">
      <article class="tile">
        <span class="label">Local Time</span>
        <span class="value" id="clock">--:--:--</span>
      </article>
      <article class="tile">
        <span class="label">Clicks</span>
        <span class="value" id="count">0</span>
      </article>
      <article class="tile">
        <span class="label">Browser</span>
        <span class="value" id="browser">Detecting...</span>
      </article>
    </section>

    <div class="actions">
      <button class="primary" id="btn">Click me</button>
      <button class="secondary" id="theme">Shift colors</button>
    </div>
    <div id="message" aria-live="polite"></div>
  </main>

  <script>
    const clock = document.getElementById("clock");
    const count = document.getElementById("count");
    const browser = document.getElementById("browser");
    const message = document.getElementById("message");

    const btn = document.getElementById("btn");
    const theme = document.getElementById("theme");

    let clicks = 0;

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString();
    }

    function detectBrowser() {
      const ua = navigator.userAgent;
      if (ua.includes("Edg")) return "Microsoft Edge";
      if (ua.includes("Chrome")) return "Google Chrome";
      if (ua.includes("Firefox")) return "Mozilla Firefox";
      if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
      return "Unknown Browser";
    }

    btn.addEventListener("click", () => {
      clicks += 1;
      count.textContent = String(clicks);
      message.textContent = `Nice click #${clicks}, Alejandra!`;
    });

    theme.addEventListener("click", () => {
      const root = document.documentElement;
      const swaps = [
        ["#fdf2e9", "#d7f9f1", "#0f766e", "#f97316"],
        ["#e0ecff", "#ffe6d7", "#1d4ed8", "#ea580c"],
        ["#fff7cc", "#dcfce7", "#166534", "#dc2626"]
      ];
      const pick = swaps[Math.floor(Math.random() * swaps.length)];
      root.style.setProperty("--bg-1", pick[0]);
      root.style.setProperty("--bg-2", pick[1]);
      root.style.setProperty("--accent", pick[2]);
      root.style.setProperty("--accent-2", pick[3]);
      message.textContent = "Color palette updated.";
    });

    browser.textContent = detectBrowser();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
